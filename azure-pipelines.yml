trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: AzureCLI@2
  displayName: Run Azure ML training job
  inputs:
    azureSubscription: 'SC-UDST-CCIT-DSAI3202-1'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      az extension add -n ml -y || az extension update -n ml
      az configure --defaults group=rg-60305219 workspace=Amazon-Electronics-Lab-60305219
      az ml job create --file jobs/train_job.yml